<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; }

.player {
    background:#1e2b3f;
    border-radius:20px;
    padding:15px;
    color:white;
    display:flex;
    align-items:center;
    gap:15px;
}

.cover {
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
}

.text { flex:1; }

.title { font-weight:bold; }

.artist { opacity:0.7; font-size:13px; }

button {
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="player">
    <img id="cover" class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div id="title" class="title">Radio Carducci</div>
        <div id="artist" class="artist">In onda</div>
    </div>

    <button id="btn">▶</button>

    <audio id="audio" crossorigin="anonymous">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");

btn.onclick = () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "⏸";
    } else {
        audio.pause();
        btn.textContent = "▶";
    }
};

// 🎵 METADATA DIRETTI DALLO STREAM (ICY)
audio.addEventListener("loadedmetadata", () => {
    try {
        const title = audio.currentSrc;

        // fallback base (alcuni browser non espongono ICY)
        document.getElementById("title").textContent = "In diretta";
        document.getElementById("artist").textContent = "Radio Carducci";

    } catch(e){}
});

// fallback aggiornamento manuale ogni tot
setInterval(() => {
    document.getElementById("title").textContent = "Radio Carducci";
    document.getElementById("artist").textContent = "In diretta";
}, 10000);
</script>

</body>
</html>
