body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  padding: 0;
  margin: 0;
}

.rc-player {
  --bx:       #5c0a1a;
  --bx-dark:  #3a0410;
  --bx-light: #8b1a2f;
  --cream:    #f5ede6;
  --gray:     rgba(245,237,230,0.45);
  --glow:     rgba(140,20,50,0.45);

  position: relative;
  width: 100%;
  max-width: 420px;
  background: linear-gradient(160deg, #2a0410 0%, #1a0208 60%, #0e0005 100%);
  border: 1px solid rgba(140,20,50,0.3);
  border-radius: 20px;
  padding: 16px 18px 14px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  color: var(--cream);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 12px 40px rgba(0,0,0,0.7),
    0 0 60px var(--glow);
}

.rc-glow {
  position: absolute;
  top: -30px; left: -30px; right: -30px;
  height: 140px;
  background: radial-gradient(ellipse at 40% 0%, rgba(140,20,50,0.3) 0%, transparent 70%);
  pointer-events: none;
  animation: glowPulse 5s ease-in-out infinite alternate;
}
@keyframes glowPulse { from { opacity: 0.6; } to { opacity: 1; } }

/* HEADER */
.rc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.rc-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #e05070;
}
.rc-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #e05070;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
.rc-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  color: rgba(245,237,230,0.45);
}

/* MAIN */
.rc-main {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.rc-cover-wrap { position: relative; flex-shrink: 0; }
.rc-cover-wrap img {
  width: 62px; height: 62px;
  border-radius: 12px;
  object-fit: cover;
  display: block;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
}
.rc-cover-ring {
  position: absolute;
  inset: -3px;
  border-radius: 15px;
  border: 2px solid transparent;
  border-top-color: #e05070;
  border-right-color: rgba(224,80,112,0.3);
  opacity: 0;
  transition: opacity 0.4s;
}
.rc-cover-ring.spinning { opacity: 1; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.rc-info { flex: 1; min-width: 0; }
.rc-label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #e05070;
  margin-bottom: 4px;
  font-weight: 500;
}
.rc-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--cream);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rc-artist {
  font-size: 11px;
  font-weight: 300;
  color: var(--gray);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* WAVEFORM + PLAY sulla stessa riga */
.rc-bottom {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.rc-wave {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 22px;
  flex: 1;
}
.rc-bar {
  flex: 1;
  border-radius: 2px;
  background: linear-gradient(to top, #8b1a2f, #e05070);
  opacity: 0.2;
  height: 3px;
  transition: height 0.3s, opacity 0.3s;
}
.rc-wave.active .rc-bar { opacity: 0.75; animation: waveAnim 1.1s ease-in-out infinite; }
.rc-wave.active .rc-bar:nth-child(1)  { animation-delay: 0s;    }
.rc-wave.active .rc-bar:nth-child(2)  { animation-delay: 0.08s; }
.rc-wave.active .rc-bar:nth-child(3)  { animation-delay: 0.16s; }
.rc-wave.active .rc-bar:nth-child(4)  { animation-delay: 0.24s; }
.rc-wave.active .rc-bar:nth-child(5)  { animation-delay: 0.12s; }
.rc-wave.active .rc-bar:nth-child(6)  { animation-delay: 0.32s; }
.rc-wave.active .rc-bar:nth-child(7)  { animation-delay: 0.04s; }
.rc-wave.active .rc-bar:nth-child(8)  { animation-delay: 0.2s;  }
.rc-wave.active .rc-bar:nth-child(9)  { animation-delay: 0.28s; }
.rc-wave.active .rc-bar:nth-child(10) { animation-delay: 0.36s; }
.rc-wave.active .rc-bar:nth-child(11) { animation-delay: 0.1s;  }
.rc-wave.active .rc-bar:nth-child(12) { animation-delay: 0.18s; }
@keyframes waveAnim { 0%,100% { height: 3px; } 50% { height: 18px; } }

.rc-play-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bx-light), var(--bx-dark));
  border: 1px solid rgba(224,80,112,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(92,10,26,0.7);
  transition: transform 0.15s, box-shadow 0.3s;
}
.rc-play-btn:hover { transform: scale(1.07); }
.rc-play-btn:active { transform: scale(0.94); }
.rc-play-btn.playing {
  box-shadow: 0 4px 20px rgba(92,10,26,0.7), 0 0 0 8px rgba(224,80,112,0.1), 0 0 30px rgba(224,80,112,0.2);
}

/* HISTORY */
.rc-history {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 10px;
  position: relative;
  z-index: 1;
}
.rc-history-label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 8px;
  font-weight: 500;
}
.rc-history-list { display: flex; flex-direction: column; gap: 6px; }
.rc-history-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  animation: fadeUp 0.35s ease forwards;
  opacity: 0;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.rc-history-cover {
  width: 30px; height: 30px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--bx), var(--bx-dark));
}
.rc-history-text { flex: 1; min-width: 0; }
.rc-history-title {
  font-size: 11px;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rc-history-artist {
  font-size: 10px;
  color: var(--gray);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

<body>

<div class="rc-player">
  <div class="rc-glow"></div>

  <div class="rc-header">
    <span class="rc-live"><span class="rc-dot"></span>LIVE</span>
    <span class="rc-brand">Radio Carducci</span>
  </div>

  <div class="rc-main">
    <div class="rc-cover-wrap">
      <img id="rcCover"
           src="https://www.radiocarducci.com/wp-content/uploads/2025/03/Screenshot_14-3-2025_165252_.jpeg"
           alt="cover"
           onerror="this.src='https://via.placeholder.com/62'">
      <div class="rc-cover-ring" id="rcRing"></div>
    </div>
    <div class="rc-info">
      <div class="rc-label">In onda ora</div>
      <div class="rc-title" id="rcTitle">Radio Carducci</div>
      <div class="rc-artist" id="rcArtist">Streaming in diretta</div>
    </div>
  </div>

  <div class="rc-bottom">
    <div class="rc-wave" id="rcWave">
      <div class="rc-bar"></div><div class="rc-bar"></div><div class="rc-bar"></div>
      <div class="rc-bar"></div><div class="rc-bar"></div><div class="rc-bar"></div>
      <div class="rc-bar"></div><div class="rc-bar"></div><div class="rc-bar"></div>
      <div class="rc-bar"></div><div class="rc-bar"></div><div class="rc-bar"></div>
    </div>
    <button class="rc-play-btn" id="rcPlayBtn" onclick="rcToggle()">
      <svg id="rcPlayIcon" viewBox="0 0 24 24" fill="white" width="20" height="20">
        <polygon points="6,3 20,12 6,21"/>
      </svg>
    </button>
  </div>

  <div class="rc-history" id="rcHistory" style="display:none">
    <div class="rc-history-label">Ascoltati di recente</div>
    <div class="rc-history-list" id="rcHistoryList"></div>
  </div>
</div>

<audio id="rcAudio" preload="none"></audio>

<script>
(function(){
  const STREAM_URL = 'https://altair.streamerr.co/stream/radiocarducci';
  const audio    = document.getElementById('rcAudio');
  const playBtn  = document.getElementById('rcPlayBtn');
  const playIcon = document.getElementById('rcPlayIcon');
  const titleEl  = document.getElementById('rcTitle');
  const artistEl = document.getElementById('rcArtist');
  const coverEl  = document.getElementById('rcCover');
  const ring     = document.getElementById('rcRing');
  const wave     = document.getElementById('rcWave');
  const histSec  = document.getElementById('rcHistory');
  const histList = document.getElementById('rcHistoryList');

  let isPlaying = false, reconnectTimer = null, lastSong = '';
  const history = [];

  const PAUSE_SVG = `<svg viewBox="0 0 24 24" fill="white" width="18" height="18"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>`;
  const PLAY_SVG  = `<svg viewBox="0 0 24 24" fill="white" width="20" height="20"><polygon points="6,3 20,12 6,21"/></svg>`;

  function setPlaying(on) {
    isPlaying = on;
    playIcon.innerHTML = on ? PAUSE_SVG : PLAY_SVG;
    playBtn.classList.toggle('playing', on);
    ring.classList.toggle('spinning', on);
    wave.classList.toggle('active', on);
  }

  window.rcToggle = function() {
    if (!isPlaying) {
      audio.src = STREAM_URL + '?' + Date.now();
      audio.play().catch(() => reconnect());
      setPlaying(true);
    } else {
      clearTimeout(reconnectTimer);
      audio.pause();
      audio.src = '';
      setPlaying(false);
    }
  };

  function reconnect() {
    if (!isPlaying) return;
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      audio.src = STREAM_URL + '?' + Date.now();
      audio.load();
      audio.play().catch(() => reconnect());
    }, 3000);
  }

  audio.addEventListener('error',   () => reconnect());
  audio.addEventListener('stalled', () => reconnect());
  audio.addEventListener('waiting', () => {
    reconnectTimer = setTimeout(() => { if (audio.readyState < 3) reconnect(); }, 5000);
  });
  audio.addEventListener('playing', () => clearTimeout(reconnectTimer));

  async function updateMetadata() {
    try {
      const res  = await fetch('https://altair.streamerr.co/json/stream/radiocarducci?' + Date.now());
      const data = await res.json();
      let song   = (data.songtitle || data.nowplaying || '').replace(/\s+/g,' ').trim();

      if (!song) { titleEl.textContent = 'Radio Carducci'; artistEl.textContent = 'In onda'; return; }

      let artist = '', title = song;
      if (song.includes(' - ')) {
        const p = song.split(' - ');
        artist  = p[0].trim();
        title   = p.slice(1).join(' - ').trim();
      }
      titleEl.textContent  = title  || song;
      artistEl.textContent = artist || 'In onda';

      if (data.coverart) coverEl.src = data.coverart.replace('100x100','300x300');

      if (song !== lastSong && lastSong !== '') {
        history.unshift({ title: titleEl.textContent, artist: artistEl.textContent, cover: data.coverart || '' });
        if (history.length > 3) history.pop();
        renderHistory();
      }
      lastSong = song;
    } catch(e) { console.log('metadata error', e); }
  }

  function renderHistory() {
    if (!history.length) return;
    histSec.style.display = 'block';
    histList.innerHTML = history.map((h, i) => `
      <div class="rc-history-item" style="animation-delay:${i*0.07}s">
        ${h.cover ? `<img class="rc-history-cover" src="${h.cover}" alt="">` : `<div class="rc-history-cover"></div>`}
        <div class="rc-history-text">
          <div class="rc-history-title">${h.title}</div>
          ${h.artist ? `<div class="rc-history-artist">${h.artist}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  updateMetadata();
  setInterval(updateMetadata, 5000);
})();
</script>
