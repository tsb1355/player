<!-- ===== PLAYER CARD ===== -->

<div class="player-card">

  <div class="player-top">
    <div class="cover-wrap">
      <div class="cover-placeholder" id="coverPlaceholder">
        <img src="https://www.radiocarducci.com/wp-content/uploads/2025/03/Screenshot_14-3-2025_165252_.jpeg"
             alt="RC"
             onerror="this.parentElement.innerHTML='🎵'">
      </div>
      <img id="coverImg" class="cover-img" style="display:none" alt="cover">
      <div class="cover-spin" id="coverSpin"></div>
    </div>
    <div class="player-info">
      <div class="now-playing-label">▶ In onda ora</div>
      <div class="track-title-wrap">
        <div class="track-title" id="trackTitle">Radio Carducci</div>
      </div>
      <div class="track-artist" id="trackArtist">Streaming in diretta 24/7</div>
    </div>
  </div>

  <div class="waveform paused" id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <div class="controls">
    <div style="flex:1">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1"
             style="width:100%;accent-color:var(--red)"
             oninput="setVolume(this.value)">
    </div>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <div class="play-icon" id="playIcon"></div>
    </button>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">Ascoltati di recente</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<audio id="audio" preload="none"></audio>

<script>
const STREAM_URL = 'https://altair.streamerr.co/stream/radiocarducci';
const audio       = document.getElementById('audio');
const playBtn     = document.getElementById('playBtn');
const playIcon    = document.getElementById('playIcon');
const trackTitle  = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const coverImg    = document.getElementById('coverImg');
const coverPlaceholder = document.getElementById('coverPlaceholder');
const coverSpin   = document.getElementById('coverSpin');
const waveform    = document.getElementById('waveform');
const historyList = document.getElementById('historyList');
const historySection = document.getElementById('historySection');

let isPlaying      = false;
let reconnectTimer = null;
let lastSong       = '';
const history      = [];

// ── PLAY / PAUSA ─────────────────────────────────────────
function togglePlay() {
  if (!isPlaying) {
    isPlaying = true;
    audio.src = STREAM_URL + '?' + Date.now();
    audio.play().catch(() => reconnect());
    playIcon.classList.add('pause');
    playBtn.classList.add('playing');
    coverSpin.classList.add('active');
    waveform.classList.remove('paused');
  } else {
    isPlaying = false;
    clearTimeout(reconnectTimer);
    audio.pause();
    audio.src = '';
    playIcon.classList.remove('pause');
    playBtn.classList.remove('playing');
    coverSpin.classList.remove('active');
    waveform.classList.add('paused');
  }
}

// ── VOLUME ────────────────────────────────────────────────
function setVolume(val) { audio.volume = val; }

// ── RICONNESSIONE AUTOMATICA ──────────────────────────────
function reconnect() {
  if (!isPlaying) return;
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    audio.src = STREAM_URL + '?' + Date.now();
    audio.load();
    audio.play().catch(() => reconnect());
  }, 3000);
}

audio.addEventListener('error',   () => reconnect());
audio.addEventListener('stalled', () => reconnect());
audio.addEventListener('waiting', () => {
  reconnectTimer = setTimeout(() => {
    if (audio.readyState < 3) reconnect();
  }, 5000);
});
audio.addEventListener('playing', () => clearTimeout(reconnectTimer));

// ── METADATA + HISTORY ────────────────────────────────────
async function updateMetadata() {
  try {
    const res  = await fetch('https://altair.streamerr.co/json/stream/radiocarducci?' + Date.now());
    const data = await res.json();

    let song = data.songtitle || data.nowplaying || '';

    if (!song.trim()) {
      trackTitle.textContent  = 'Radio Carducci';
      trackArtist.textContent = 'In onda';
      return;
    }

    song = song.replace(/\s+/g, ' ').trim();

    let artist = '';
    let title  = song;

    if (song.includes(' - ')) {
      const parts = song.split(' - ');
      artist = parts[0].trim();
      title  = parts.slice(1).join(' - ').trim();
    }

    trackTitle.textContent  = title  || song;
    trackArtist.textContent = artist || 'In onda';

    // cover art
    if (data.coverart) {
      const src = data.coverart.replace('100x100', '300x300');
      coverImg.src = src;
      coverImg.onload = () => {
        coverImg.style.display = 'block';
        coverPlaceholder.style.display = 'none';
      };
    }

    // history
    if (song !== lastSong && lastSong !== '') {
      history.unshift({ title: trackTitle.textContent, artist: trackArtist.textContent, cover: data.coverart || '' });
      if (history.length > 3) history.pop();
      renderHistory();
    }
    lastSong = song;

  } catch(e) {
    console.log('metadata error', e);
  }
}

function renderHistory() {
  if (!history.length) return;
  historySection.style.display = 'block';
  historyList.innerHTML = history.map((h, i) => `
    <div class="history-item" style="animation-delay:${i * 0.08}s">
      ${h.cover
        ? `<img class="history-cover" src="${h.cover}" alt="">`
        : `<div class="history-cover"></div>`}
      <div class="history-title">${h.artist ? h.artist + ' – ' : ''}${h.title}</div>
    </div>
  `).join('');
}

updateMetadata();
setInterval(updateMetadata, 5000);
</script>
