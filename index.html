<div class="radio-ui">
    <img class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div class="title">Caricamento...</div>
        <div class="artist">...</div>
    </div>

    <button class="play">▶</button>

    <input type="range" class="volume" min="0" max="1" step="0.01" value="1">

    <audio class="radio" playsinline>
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<style>
.radio-ui {
    max-width: 520px;
    width: 100%;
    background: #140606;
    border-radius: 30px;
    padding: 30px;
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 15px 20px;
    align-items: center;
    color: white;
    font-family: Arial;
    box-shadow: 0 12px 35px rgba(255,0,0,0.3);
}

.cover {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.artist {
    opacity: 0.8;
    font-size: 16px;
}

.play {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border-radius: 50%;
    color: white;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,0,0,0.5);
}

.volume {
    grid-column: 2 / span 2;
    width: 100%;
    accent-color: red;
}
</style>

<script>
setTimeout(function(){

    const player = document.querySelector(".radio-ui");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");
    const title = player.querySelector(".title");
    const artist = player.querySelector(".artist");
    const cover = player.querySelector(".cover");

    // PLAY
    btn.onclick = function(){
        if(audio.paused){
            audio.play();
            btn.textContent = "⏸";
        } else {
            audio.pause();
            btn.textContent = "▶";
        }
    };

    // VOLUME
    volume.oninput = function(e){
        audio.volume = e.target.value;
    };

    // DESKTOP METADATA
    async function update(){
        try{
            const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci?"+Date.now());
            const data = await res.json();

            applyData(data);

        } catch(e){
            console.log("fetch fallito → uso fallback mobile");
        }
    }

    // MOBILE FALLBACK (iframe)
    function updateFromFrame(){
        try{
            const frame = document.getElementById("metaFrame");
            if(!frame) return;

            const text = frame.contentDocument.body.innerText;
            const data = JSON.parse(text);

            applyData(data);

        } catch(e){
            console.log("iframe fallback attivo");
        }
    }

    // APPLICA DATI
    function applyData(data){
        let song = data.songtitle || data.nowplaying || "";

        if(!song) return;

        song = song.trim();

        let artistName = "";
        let trackTitle = song;

        if(song.includes(" - ")){
            const parts = song.split(" - ");
            artistName = parts[0];
            trackTitle = parts.slice(1).join(" - ");
        }

        title.textContent = trackTitle;
        artist.textContent = artistName || "In onda";

        if(data.coverart){
            cover.src = data.coverart.replace("100x100","300x300");
        }
    }

    // iframe nascosto per mobile
    const iframe = document.createElement("iframe");
    iframe.id = "metaFrame";
    iframe.src = "https://altair.streamerr.co/json/stream/radiocarducci";
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    update();
    setInterval(update, 5000);

    setInterval(updateFromFrame, 7000);

}, 1000);
</script>
