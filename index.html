<div class="radio-ui">
    <img class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div class="title">Caricamento...</div>
        <div class="artist">...</div>
    </div>

    <button class="play">▶</button>

    <input type="range" class="volume" min="0" max="1" step="0.01" value="1">

    <audio class="radio">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<style>
.radio-ui {
    max-width: 520px; /* PIÙ GRANDE */
    width: 100%;
    background: #140606; /* PIÙ ROSSO SCURO */
    border-radius: 30px;
    padding: 30px; /* PIÙ SPAZIO */
    display: grid;
    grid-template-columns: 100px 1fr auto; /* PIÙ GRANDE */
    grid-template-rows: auto auto;
    gap: 15px 20px;
    align-items: center;
    color: white;
    font-family: Arial;
    box-shadow: 0 12px 35px rgba(255,0,0,0.3); /* GLOW ROSSO */
}

.cover {
    width: 90px; /* PIÙ GRANDE */
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
    grid-row: span 2;
}

.title {
    font-size: 22px; /* PIÙ GRANDE */
    font-weight: bold;
}

.artist {
    opacity: 0.8;
    font-size: 16px;
}

/* BOTTONE ROSSO PIÙ EVIDENTE */
.play {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border-radius: 50%;
    color: white;
    font-size: 26px;
    border: none;
    cursor: pointer;
    grid-row: span 2;
    box-shadow: 0 8px 20px rgba(255,0,0,0.5);
}

/* SLIDER ROSSO */
.volume {
    grid-column: 2 / span 2;
    width: 100%;
    accent-color: #ff0000;
}
</style>

<script>
setTimeout(function(){

    const player = document.querySelector(".radio-ui");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");
    const title = player.querySelector(".title");
    const artist = player.querySelector(".artist");
    const cover = player.querySelector(".cover");

    btn.onclick = function(){
        if(audio.paused){
            audio.play();
            btn.textContent = "⏸";
        } else {
            audio.pause();
            btn.textContent = "▶";
        }
    };

    volume.oninput = function(e){
        audio.volume = e.target.value;
    };

    async function update(){
        try{
            const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci?"+Date.now());
            const data = await res.json();

            let song = data.songtitle || data.nowplaying || "";

            if(!song || song.trim() === ""){
                title.textContent = "Radio Carducci";
                artist.textContent = "In onda";
                return;
            }

            song = song.replace(/\s+/g, " ").trim();

            let artistName = "";
            let trackTitle = song;

            if(song.includes(" - ")){
                const parts = song.split(" - ");
                artistName = parts[0].trim();
                trackTitle = parts.slice(1).join(" - ").trim();
            }

            if(!trackTitle) trackTitle = song;

            title.textContent = trackTitle;
            artist.textContent = artistName || "In onda";

            if(data.coverart){
                cover.src = data.coverart.replace("100x100","300x300");
            }

        } catch(e){
            console.log("metadata error", e);
        }
    }

    update();
    setInterval(update, 5000);

}, 1000);
</script>
<script>
setTimeout(function(){

    // se mobile → forza aggiornamento semplice
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {

        async function mobileUpdate(){
            try{
                const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci");
                const data = await res.json();

                let song = data.songtitle || "";

                if(song.includes(" - ")){
                    let parts = song.split(" - ");
                    document.querySelector(".artist").textContent = parts[0];
                    document.querySelector(".title").textContent = parts.slice(1).join(" - ");
                }

                if(data.coverart){
                    document.querySelector(".cover").src =
                        data.coverart.replace("100x100","300x300");
                }

            } catch(e){
                console.log("mobile fallback attivo");
            }
        }

        mobileUpdate();
        setInterval(mobileUpdate, 7000);
    }

}, 2000);
</script>
