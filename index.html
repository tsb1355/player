<div class="radio-ui-custom">
    <img class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div class="title">Caricamento...</div>
        <div class="artist">...</div>
    </div>

    <button class="play">▶</button>

    <input type="range" class="volume" min="0" max="1" step="0.01" value="1">

    <audio class="radio">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<style>
/* FORZATO con !important */
.radio-ui-custom {
    max-width: 520px !important;
    width: 100% !important;
    background: #120606 !important;
    border-radius: 30px !important;
    padding: 30px !important;
    display: grid !important;
    grid-template-columns: 110px 1fr auto !important;
    gap: 15px 20px !important;
    align-items: center !important;
    color: white !important;
    font-family: Arial !important;
    box-shadow: 0 15px 40px rgba(255,0,0,0.3) !important;
}

.radio-ui-custom .cover {
    width: 100px !important;
    height: 100px !important;
    border-radius: 15px !important;
    object-fit: cover !important;
}

.radio-ui-custom .title {
    font-size: 22px !important;
    font-weight: bold !important;
}

.radio-ui-custom .artist {
    font-size: 16px !important;
    opacity: 0.8 !important;
}

/* bottone bello rosso */
.radio-ui-custom .play {
    width: 75px !important;
    height: 75px !important;
    background: linear-gradient(135deg, #ff0000, #990000) !important;
    border-radius: 50% !important;
    font-size: 26px !important;
    border: none !important;
    cursor: pointer !important;
    color: white !important;
    box-shadow: 0 8px 20px rgba(255,0,0,0.5) !important;
}

/* slider rosso */
.radio-ui-custom .volume {
    grid-column: 2 / span 2 !important;
    width: 100% !important;
    accent-color: red !important;
}
</style>

<script>
setTimeout(function(){

    const player = document.querySelector(".radio-ui-custom");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");
    const title = player.querySelector(".title");
    const artist = player.querySelector(".artist");
    const cover = player.querySelector(".cover");

    btn.onclick = function(){
        if(audio.paused){
            audio.play();
            btn.textContent = "⏸";
        } else {
            audio.pause();
            btn.textContent = "▶";
        }
    };

    volume.oninput = function(e){
        audio.volume = e.target.value;
    };

    async function update(){
        try{
            const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci?"+Date.now());
            const data = await res.json();

            let song = data.songtitle || "";

            if(song.includes(" - ")){
                let parts = song.split(" - ");
                artist.textContent = parts[0];
                title.textContent = parts.slice(1).join(" - ");
            } else {
                title.textContent = song || "Radio Carducci";
                artist.textContent = "In onda";
            }

            if(data.coverart){
                cover.src = data.coverart.replace("100x100","300x300");
            }

        } catch(e){}
    }

    update();
    setInterval(update, 5000);

}, 1000);
</script>
