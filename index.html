<div class="radio-ui">
    <img class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div class="title">Caricamento...</div>
        <div class="artist">...</div>
    </div>

    <button class="play">▶</button>

    <input type="range" class="volume" min="0" max="1" step="0.01" value="1">

    <audio class="radio" playsinline preload="none">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<style>
.radio-ui {
    max-width: 520px;
    width: 100%;
    background: #140606;
    border-radius: 30px;
    padding: 30px;
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 15px 20px;
    align-items: center;
    color: white;
    font-family: Arial;
}

.cover {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.artist {
    opacity: 0.8;
    font-size: 16px;
}

.play {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border-radius: 50%;
    color: white;
    font-size: 26px;
    border: none;
    cursor: pointer;
}

.volume {
    grid-column: 2 / span 2;
    width: 100%;
    accent-color: red;
}
</style>

<script>
window.addEventListener("load", function(){

    const player = document.querySelector(".radio-ui");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");

    // 🔥 FIX MOBILE PLAY
    btn.addEventListener("click", function(){

        if(audio.paused){
            audio.play().then(()=>{
                btn.textContent = "⏸";
            }).catch(()=>{
                console.log("play bloccato");
            });
        } else {
            audio.pause();
            btn.textContent = "▶";
        }

    });

    // volume
    volume.addEventListener("input", function(e){
        audio.volume = e.target.value;
    });

});
</script>
