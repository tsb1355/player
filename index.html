<style>
.radio-ui {
    max-width: 520px;
    width: 100%;
    background: #140606;
    border-radius: 30px;
    padding: 30px;
    display: grid;
    grid-template-columns: 100px 1fr auto;
    grid-template-rows: auto auto;
    gap: 15px 20px;
    align-items: center;
    color: white;
    font-family: Arial;
    box-shadow: 0 12px 35px rgba(255,0,0,0.3);
}

.cover {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
    grid-row: span 2;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.artist {
    opacity: 0.8;
    font-size: 16px;
}

.play {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border-radius: 50%;
    color: white;
    font-size: 26px;
    border: none;
    cursor: pointer;
    grid-row: span 2;
    box-shadow: 0 8px 20px rgba(255,0,0,0.5);
}

.volume {
    grid-column: 2 / span 2;
    width: 100%;
    accent-color: #ff0000;
}
</style>

<script>
setTimeout(function(){

    const player = document.querySelector(".radio-ui");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");
    const title = player.querySelector(".title");
    const artist = player.querySelector(".artist");
    const cover = player.querySelector(".cover");

    const STREAM_URL = "https://altair.streamerr.co/stream/radiocarducci";
    let isPlaying = false;
    let reconnectTimer = null;

    // ── RICONNESSIONE AUTOMATICA ──────────────────────────
    function reconnect() {
        if (!isPlaying) return;
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(function() {
            audio.src = STREAM_URL + "?" + Date.now();
            audio.load();
            audio.play().catch(function() { reconnect(); });
        }, 3000);
    }

    audio.addEventListener("error",   function() { reconnect(); });
    audio.addEventListener("stalled", function() { reconnect(); });
    audio.addEventListener("waiting", function() {
        reconnectTimer = setTimeout(function() {
            if (audio.readyState < 3) reconnect();
        }, 5000);
    });
    audio.addEventListener("playing", function() { clearTimeout(reconnectTimer); });

    // ── PLAY / PAUSA ──────────────────────────────────────
    btn.onclick = function() {
        if (!isPlaying) {
            isPlaying = true;
            audio.src = STREAM_URL + "?" + Date.now();
            audio.play().catch(function() { reconnect(); });
            btn.textContent = "⏸";
        } else {
            isPlaying = false;
            clearTimeout(reconnectTimer);
            audio.pause();
            audio.src = "";
            btn.textContent = "▶";
        }
    };

    // ── VOLUME ────────────────────────────────────────────
    volume.oninput = function(e) {
        audio.volume = e.target.value;
    };

    // ── METADATA ──────────────────────────────────────────
    async function update() {
        try {
            const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci?" + Date.now());
            const data = await res.json();

            let song = data.songtitle || data.nowplaying || "";

            if (!song || song.trim() === "") {
                title.textContent = "Radio Carducci";
                artist.textContent = "In onda";
                return;
            }

            song = song.replace(/\s+/g, " ").trim();

            let artistName = "";
            let trackTitle = song;

            if (song.includes(" - ")) {
                const parts = song.split(" - ");
                artistName = parts[0].trim();
                trackTitle = parts.slice(1).join(" - ").trim();
            }

            if (!trackTitle) trackTitle = song;

            title.textContent = trackTitle;
            artist.textContent = artistName || "In onda";

            if (data.coverart) {
                cover.src = data.coverart.replace("100x100", "300x300");
            }

        } catch(e) {
            console.log("metadata error", e);
        }
    }

    update();
    setInterval(update, 5000);

}, 1000);
</script>
