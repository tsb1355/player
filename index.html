<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; }

.player {
    background:#1e2b3f;
    border-radius:20px;
    padding:15px;
    color:white;
    display:flex;
    align-items:center;
    gap:15px;
}

.cover {
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
}

.text { flex:1; }

.title { font-weight:bold; }

.artist { opacity:0.7; font-size:13px; }

button {
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="player">
    <img id="cover" class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div id="title" class="title">Caricamento...</div>
        <div id="artist" class="artist">...</div>
    </div>

    <button id="btn">▶</button>

    <audio id="audio">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");

btn.onclick = () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "⏸";
    } else {
        audio.pause();
        btn.textContent = "▶";
    }
};

// 🔥 PROXY CHE FUNZIONA DAVVERO
async function update(){
    try{
        const res = await fetch(
            "https://api.codetabs.com/v1/proxy?quest=" +
            encodeURIComponent("https://altair.streamerr.co/json/stream/radiocarducci")
        );

        const data = await res.json();

        console.log("DATA:", data);

        let song = data.songtitle || "";

        if(song.includes(" - ")){
            let parts = song.split(" - ");
            document.getElementById("artist").textContent = parts[0];
            document.getElementById("title").textContent = parts.slice(1).join(" - ");
        } else {
            document.getElementById("title").textContent = song || "Radio Carducci";
            document.getElementById("artist").textContent = "In onda";
        }

        if(data.coverart){
            document.getElementById("cover").src =
                data.coverart.replace("100x100","300x300");
        }

    } catch(e){
        console.log("ERRORE:", e);
    }
}

setInterval(update, 5000);
update();
</script>

</body>
</html>
