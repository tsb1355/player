<div class="radio-ui">
    <img class="cover" src="https://via.placeholder.com/80">

    <div class="text">
        <div class="title">Caricamento...</div>
        <div class="artist">...</div>
    </div>

    <button class="play">▶</button>

    <input type="range" class="volume" min="0" max="1" step="0.01" value="1">

    <audio class="radio">
        <source src="https://altair.streamerr.co/stream/radiocarducci" type="audio/mpeg">
    </audio>
</div>

<style>
.radio-ui {
    max-width: 500px; /* più grande */
    width: 100%;
    background: #1a0f12; /* base più scura rossa */
    border-radius: 25px;
    padding: 25px;
    display: grid;
    grid-template-columns: 100px 1fr auto;
    grid-template-rows: auto auto;
    gap: 12px 18px;
    align-items: center;
    color: white;
    font-family: Arial;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* cover più grande */
.cover {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
    grid-row: span 2;
}

/* titolo più visibile */
.title {
    font-size: 20px;
    font-weight: bold;
}

/* artista */
.artist {
    opacity: 0.7;
    font-size: 15px;
}

/* bottone rosso principale */
.play {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #ff2e2e, #b30000);
    border-radius: 50%;
    color: white;
    font-size: 24px;
    border: none;
    cursor: pointer;
    grid-row: span 2;
    box-shadow: 0 5px 15px rgba(255,0,0,0.4);
}

/* volume rosso */
.volume {
    grid-column: 2 / span 2;
    width: 100%;
    accent-color: #ff2e2e;
}
</style>

<script>
setTimeout(function(){

    const player = document.querySelector(".radio-ui");
    if (!player) return;

    const audio = player.querySelector(".radio");
    const btn = player.querySelector(".play");
    const volume = player.querySelector(".volume");
    const title = player.querySelector(".title");
    const artist = player.querySelector(".artist");
    const cover = player.querySelector(".cover");

    btn.onclick = function(){
        if(audio.paused){
            audio.play();
            btn.textContent = "⏸";
        } else {
            audio.pause();
            btn.textContent = "▶";
        }
    };

    volume.oninput = function(e){
        audio.volume = e.target.value;
    };

    async function update(){
        try{
            const res = await fetch("https://altair.streamerr.co/json/stream/radiocarducci?"+Date.now());
            const data = await res.json();

            let song = data.songtitle || data.nowplaying || "";

            if(!song || song.trim() === ""){
                title.textContent = "Radio Carducci";
                artist.textContent = "In onda";
                return;
            }

            song = song.replace(/\s+/g, " ").trim();

            let artistName = "";
            let trackTitle = song;

            if(song.includes(" - ")){
                const parts = song.split(" - ");
                artistName = parts[0].trim();
                trackTitle = parts.slice(1).join(" - ").trim();
            }

            title.textContent = trackTitle;
            artist.textContent = artistName || "In onda";

            if(data.coverart){
                cover.src = data.coverart.replace("100x100","300x300");
            }

        } catch(e){
            console.log("metadata error", e);
        }
    }

    update();
    setInterval(update, 5000);

}, 1000);
</script>
